version: '3'

services:
  dvwa:
    image: vulnerables/web-dvwa
    container_name: dvwa_app
    networks:
      - dvwa-net

  nginx:
    image: nginx:alpine
    container_name: dvwa_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/dvwa.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - dvwa
    networks:
      - dvwa-net

networks:
  dvwa-net:
    driver: bridge